server:
  port: 8087

spring:
  application:
    name: fiscal-service
  datasource:
    url: jdbc:postgresql://localhost:5432/fiscal
    username: admin
    password: secret
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 2
          max-wait: 500ms
      host: localhost
      port: 6379
      password: claveSegura123
      timeout: 200ms
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        '[format_sql]': true


logging:
  level:
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.type.descriptor.sql]': TRACE

auth-service:
  base-url: http://localhost:8081

fiscal:
  artifacts:
    storage-mode: FILE_SYSTEM
    base-path: C:/Users/User/Documents/proyecto personal/pointofsale/resources/fiscal
